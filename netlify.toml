[build]
  command = """
    mkdir -p /opt/build/repo/ephe && \
    cp -r ephe/* /opt/build/repo/ephe/ && \
    chmod 644 /opt/build/repo/ephe/* && \
    npm run build
  """
  publish = ".next"

[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://astrogenie.netlify.app"
  NODE_VERSION = "18.20.0"
  NPM_VERSION = "9.x"
  ENABLE_NATIVE_MODULES = "true"
  LD_LIBRARY_PATH = "/usr/local/lib"
  SWISSEPH_PATH = "/opt/build/repo/ephe"
  NPM_CONFIG_OPTIONAL = "true"
  NODE_ENV = "production"
  NPM_CONFIG_BUILD_FROM_SOURCE = "true"
  NPM_CONFIG_PLATFORM = "linux"
  NPM_CONFIG_ARCH = "x64"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["swisseph-v2", "swisseph"]
  included_files = [
    "ephe/**",
    "node_modules/swisseph-v2/build/Release/**"
  ]

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    Access-Control-Allow-Origin = "*"
