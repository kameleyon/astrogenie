[build]
  command = """
    npm install --no-save --build-from-source swisseph-v2 && \
    cp -r node_modules/swisseph-v2/build/Release/* .next/standalone/ && \
    npm run build
  """
  publish = ".next"

[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://astrogenie.netlify.app"
  NODE_VERSION = "18.20.0"
  NPM_VERSION = "9.x"
  ENABLE_NATIVE_MODULES = "true"
  LD_LIBRARY_PATH = "/usr/local/lib"
  SWISSEPH_PATH = "/opt/build/repo/ephe"
  NPM_CONFIG_OPTIONAL = "true"
  NODE_ENV = "production"
  NPM_CONFIG_BUILD_FROM_SOURCE = "true"
  NPM_CONFIG_PLATFORM = "linux"
  NPM_CONFIG_ARCH = "x64"

[functions]
  node_bundler = "esbuild"
  included_files = [
    "ephe/**",
    "node_modules/swisseph-v2/build/Release/**"
  ]

[functions."*"]
  included_files = [
    "ephe/**",
    ".next/required-server-files.json",
    ".next/server/**/*",
    ".next/static/**/*",
    "node_modules/swisseph-v2/build/Release/**",
    "node_modules/swisseph/**"
  ]

[functions.next_api_calculate]
  node_bundler = "esbuild"
  included_files = [
    "ephe/**",
    ".next/required-server-files.json",
    ".next/server/**/*",
    ".next/static/**/*",
    "node_modules/swisseph-v2/build/Release/**",
    "node_modules/swisseph/**"
  ]
  environment = { SWISSEPH_PATH = "/opt/build/repo/ephe" }

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Origin = "*"

[[plugins]]
  package = "@netlify/plugin-nextjs"
